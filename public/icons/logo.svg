<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#111827"/>
  
  <!-- Graduation Cap -->
  <g transform="translate(256, 220)">
    <!-- Cap top (mortarboard) -->
    <polygon points="0,-80 140,0 0,40 -140,0" fill="#ffffff"/>
    
    <!-- Cap base -->
    <ellipse cx="0" cy="40" rx="100" ry="25" fill="#e5e7eb"/>
    
    <!-- Tassel button -->
    <circle cx="0" cy="-80" r="15" fill="#fbbf24"/>
    
    <!-- Tassel cord -->
    <path d="M0,-65 Q40,-40 50,20 Q55,60 45,100" 
          stroke="#fbbf24" 
          stroke-width="8" 
          fill="none" 
          stroke-linecap="round"/>
    
    <!-- Tassel end -->
    <path d="M40,95 L50,140 L45,100 L55,95 Z" fill="#fbbf24"/>
  </g>
  
  <!-- FYP Text -->
  <text x="256" y="420" 
        font-family="Arial, sans-serif" 
        font-size="80" 
        font-weight="bold" 
        fill="#ffffff" 
        text-anchor="middle">FYP</text>
</svg>